{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block titulo %}
        {% endblock %}
    </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css" integrity="sha384-zCbKRCUGaJDkqS1kPbPd7TveP5iyJE0EjAuZQTgFLD2ylzuqKfdKlfG/eSrtxUkn" crossorigin="anonymous">
    <!--link del css-->
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</head>

<body>
    <header>
        <div class="container">
        <div class="logo-box">
            <a href="/home/">
            <img src="https://html5book.ru/wp-content/uploads/2015/01/logo-header.png">
            </a>
        </div>
        <nav>
        <ul>
            <li><a href="/home/">Inicio</a></li>
            <li><a href="/products/">Productos</a></li>
            <li><a href="/products/create-product/">Cargar Productos</a></li>
            {% if request.user.is_authenticated %}
            <li><a href="/register/">{{request.user.username}}</a></li>
            <li><a href="/logout/">Logout</a></li>
            {% else %}
            <li><a href="/login/">Login</a></li>
            <li><a href="/register/">Register</a></li>
            
            {% endif %}
        </ul>
        </nav>
        </div>
    </header>
    <form class="form-inline my-2 my-lg-0" action = "/products/search-product/" method = "GET">
        <input class="form-control mr-sm-2" type="text" placeholder="Buscar productos" aria-label="Search" name = 'search'>
        <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
    </form>

    {% block contenido %}
    {% endblock %}

</body>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"
    integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj"
    crossorigin="anonymous"></script>

</html>
